name: EAS Production Build

on:
  push:
    branches: ["master"]
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "!packages/ui/**"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm run build

      - name: Generate shared dependencies
        run: pnpm run generate

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EAS_ACCESS_TOKEN }}

      - name: Validate Authentication
        run: |
          if [ -z "${{ secrets.EAS_ACCESS_TOKEN }}" ]; then
            echo "Error: EAS_ACCESS_TOKEN is not set. Please add it to SecureVault GitHub Secrets."
            exit 1
          fi
          npx eas whoami

      - name: Check app.json version change
        id: version_check
        run: |
          PREV_VERSION=$(git show HEAD^:apps/mobile/app.json | jq -r '.expo.version // .version')
          CURR_VERSION=$(jq -r '.expo.version // .version' apps/mobile/app.json)

          echo "Previous version: $PREV_VERSION"
          echo "Current version: $CURR_VERSION"

          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Android
        if: steps.version_check.outputs.version_changed == 'true'
        run: |
          cd apps/mobile
          npx eas build --platform android --profile production --non-interactive
        env:
          EAS_ACCESS_TOKEN: ${{ secrets.EAS_ACCESS_TOKEN }}

      - name: Publish OTA update
        run: |
          cd apps/mobile
          npx eas update --branch production --message "${{ github.event.head_commit.message }}"
        env:
          EAS_ACCESS_TOKEN: ${{ secrets.EAS_ACCESS_TOKEN }}
