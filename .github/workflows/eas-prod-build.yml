name: EAS Production Build

on:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "!packages/ui/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 🏗️ Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏗️ Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: 🏗️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: 🏗️ Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: pnpm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies & build shared packages
        run: |
          # EAS pre-install hook
          pnpm run eas-build-pre-install
          # EAS post-install hook
          pnpm run eas-build-post-install

      - name: 🔖 Check app.json version change
        id: version_check
        run: |
          PREV_VERSION=$(git show HEAD^:apps/mobile/app.json | jq -r '.expo.version // .version')
          CURR_VERSION=$(jq -r '.expo.version // .version' apps/mobile/app.json)

          echo "Previous version: $PREV_VERSION"
          echo "Current version:  $CURR_VERSION"
          echo "current_version=$CURR_VERSION" >> $GITHUB_OUTPUT

          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 🏗️ Build Android
        if: steps.version_check.outputs.version_changed == 'true'
        working-directory: apps/mobile
        run: eas build --platform android --profile production --non-interactive

      - name: ⚡ Publish OTA update
        working-directory: apps/mobile
        run: |
          eas update \
            --channel production \
            --message "v${{ steps.version_check.outputs.current_version }} — ${{ github.event.head_commit.message }}" \
            --non-interactive
