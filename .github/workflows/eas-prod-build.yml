name: EAS Production Build

# This workflow automates EAS Production builds and OTA updates for the mobile application.
# It relies on the 'eas-build-pre-install' hook in the root package.json for monorepo preparation.
# Version change logic:
#   - app.json version changed → new EAS production build + OTA update
#   - app.json version unchanged → OTA update only (JS/UI changes)
on:
  push:
    branches:
      - master
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "!packages/ui/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 🏗️ Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to access HEAD^ for version comparison

      - name: 🏗️ Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: 🏗️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: pnpm # pnpm cache requires pnpm/action-setup to be run first

      - name: 🏗️ Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: pnpm # Tell the action to use pnpm
          token: ${{ secrets.EXPO_TOKEN }} # Official token name per expo-github-action docs

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build shared packages
        run: pnpm run build

      - name: ⚙️ Generate shared dependencies
        run: pnpm run generate

      - name: 🔖 Check app.json version change
        id: version_check
        run: |
          PREV_VERSION=$(git show HEAD^:apps/mobile/app.json | jq -r '.expo.version // .version')
          CURR_VERSION=$(jq -r '.expo.version // .version' apps/mobile/app.json)

          echo "Previous version: $PREV_VERSION"
          echo "Current version:  $CURR_VERSION"
          echo "current_version=$CURR_VERSION" >> $GITHUB_OUTPUT

          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 🏗️ Build Android
        if: steps.version_check.outputs.version_changed == 'true'
        working-directory: apps/mobile
        run: eas build --platform android --profile production --non-interactive
        # No env needed — expo/expo-github-action exports EXPO_TOKEN automatically

      - name: ⚡ Publish OTA update
        working-directory: apps/mobile
        run: |
          eas update \
            --channel production \
            --message "v${{ steps.version_check.outputs.current_version }} — ${{ github.event.head_commit.message }}" \
            --non-interactive
        # No env needed — expo/expo-github-action exports EXPO_TOKEN automatically
