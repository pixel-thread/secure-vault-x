name: Migrate PROD Prisma database
on:
  push:
    paths:
      - "apps/web/src/libs/db/prisma/schema.prisma"
      - "apps/web/src/libs/db/prisma/migrations/**"
    branches:
      - master

# This workflow automates the application of Prisma migrations to the production database.
# It is triggered whenever changes are pushed to the schema or migrations on the master branch.
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Dependencies
        # Using --frozen-lockfile ensures that the build is deterministic and matches the lockfile exactly.
        run: pnpm install --frozen-lockfile

      - name: Run Prisma Migrations
        # The --schema flag is used to specify the exact location of the schema file within the monorepo.
        run: npx prisma migrate deploy --schema=apps/web/src/libs/db/prisma/schema.prisma
