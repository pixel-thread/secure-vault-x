# This workflow automates the deployment of the '@securevault/web' application to a Vercel Preview environment.
# It is specifically targeted for the 'uat' branch and uses a "Build then Deploy" strategy.
jobs:
  deploy:
    name: Deploy to Preview (UAT)
    runs-on: ubuntu-latest
    # Assuming 'preview' or 'uat' environment is configured in GitHub for these secrets.
    environment: preview

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Dependencies
        # Using --frozen-lockfile ensures deterministic builds.
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Clients
        # Generates database clients across the monorepo workspace.
        run: pnpm run generate

      - name: Build Workspace
        # Builds all internal packages and the web application.
        run: pnpm run build

      - name: Pull Vercel Preview Settings
        # Pulls the configuration for the Preview/UAT environment.
        run: npx vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build Project for Vercel (Preview)
        # Builds the project locally using Vercel's preview engine.
        run: npx vercel build --token=$VERCEL_TOKEN

      - name: Deploy Prebuilt Artifacts to Vercel (Preview)
        # Deploys the artifacts to a Vercel Preview URL.
        run: npx vercel deploy --prebuilt --token=$VERCEL_TOKEN
