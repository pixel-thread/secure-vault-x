name: EAS Preview Build

# This workflow automates EAS Preview builds and OTA updates for the mobile application.
# It relies on the 'eas-build-pre-install' hook in the root package.json for monorepo preparation.
# Version change logic:
#   - app.json version changed → new EAS build + OTA update
#   - app.json version unchanged → OTA update only (JS/UI changes)
on:
  push:
    branches: ["uat"]
    paths:
      - "apps/mobile/**"
      - "packages/**/**"
      - "!packages/ui/**"

jobs:
  install_dependencies:
    name: Install dependencies
    type: run
    environment: preview
    steps:
      - run: pnpm install --frozen-lockfile

  build_shared_packages:
    name: Build shared packages
    type: run
    environment: preview
    needs: [install_dependencies]
    steps:
      - run: pnpm run build

  generate_shared_dependencies:
    name: Generate shared dependencies
    type: run
    environment: preview
    needs: [build_shared_packages]          # Fix: was [build_dependencies]
    steps:
      - run: pnpm run generate

  check_app_version:
    name: 🔖 Check app.json version change
    type: run
    environment: preview
    needs: [install_dependencies]
    outputs:
      version_changed: ${{ steps.version_check.outputs.version_changed }}
    steps:
      - name: Compare app.json version with previous commit
        id: version_check
        run: |
          git fetch origin ${{ github.event.before }} --depth=1

          PREV_VERSION=$(git show ${{ github.event.before }}:apps/mobile/app.json \
            | jq -r '.expo.version // .version')

          CURR_VERSION=$(jq -r '.expo.version // .version' apps/mobile/app.json)

          echo "Previous version: $PREV_VERSION"
          echo "Current version:  $CURR_VERSION"

          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

  fingerprint:
    name: 📋 Calculate fingerprint
    type: fingerprint
    environment: preview
    working_directory: apps/mobile
    needs:
      [install_dependencies, build_shared_packages, generate_shared_dependencies]  # Fix: was build_dependencies

  check_existing_build:
    name: 🔍 Check existing build
    type: get-build
    environment: preview
    working_directory: apps/mobile
    needs: [fingerprint]
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      profile: preview

  build_new:
    name: 🏗️ Create new build
    type: build
    environment: preview
    working_directory: apps/mobile
    needs: [fingerprint, check_existing_build, check_app_version]
    # Build when: no existing build found OR app.json version has changed
    if: ${{ 
      github.event_name != 'pull_request' && 
      (!needs.check_existing_build.outputs.build_id || 
      needs.check_app_version.outputs.version_changed == 'true') 
    }}
    params:
      platform: android
      profile: preview

  publish_ota:
    name: ⚡ Publish OTA Update
    type: update
    environment: preview
    working_directory: apps/mobile
    needs: [fingerprint, check_existing_build, check_app_version]
    # Always publish OTA — for version bumps it ships alongside the new build,
    # for JS-only changes it is the only update needed.
    params:
      platform: android
      branch: preview
      channel: preview
      message: "UI/JS changes: ${{ github.event.head_commit.message }}"
